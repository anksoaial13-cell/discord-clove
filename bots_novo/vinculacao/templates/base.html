<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or 'Clove • Vinculação Valorant' }}</title>
  <style>
    :root {
      --bg-1: #0e1020;
      --bg-2: #17142d;
      --bg-3: #251a3f;

      --panel: rgba(22, 20, 39, 0.88);
      --panel-strong: rgba(30, 25, 52, 0.96);
      --soft: rgba(255,255,255,0.05);

      --text: #f7f4ff;
      --muted: #cdbfe8;
      --muted-2: #a692c9;

      --primary: #c45cff;
      --primary-2: #8d66ff;
      --accent: #7ed8ff;
      --accent-2: #ff75cb;

      --danger: #ff78bc;
      --success: #77f2c2;

      --border: rgba(206, 179, 255, 0.14);
      --shadow: rgba(0, 0, 0, 0.42);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      padding: 24px;
      color: var(--text);
      font-family: Inter, system-ui, Arial, sans-serif;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 15% 20%, rgba(126, 216, 255, 0.12), transparent 28%),
        radial-gradient(circle at 85% 18%, rgba(196, 92, 255, 0.16), transparent 30%),
        radial-gradient(circle at 50% 100%, rgba(255, 117, 203, 0.10), transparent 32%),
        linear-gradient(145deg, var(--bg-1) 0%, var(--bg-2) 45%, var(--bg-3) 100%);
    }

    .card {
      width: 100%;
      max-width: 820px;
      position: relative;
      overflow: hidden;
      border-radius: 26px;
      padding: 30px;
      background: linear-gradient(180deg, rgba(27, 24, 47, 0.95) 0%, rgba(21, 19, 38, 0.95) 100%);
      border: 1px solid var(--border);
      box-shadow:
        0 24px 80px var(--shadow),
        inset 0 1px 0 rgba(255,255,255,0.04);
      backdrop-filter: blur(16px);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top left, rgba(126, 216, 255, 0.08), transparent 22%),
        radial-gradient(circle at top right, rgba(196, 92, 255, 0.10), transparent 24%);
      pointer-events: none;
    }

    .brand {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
    }

    .logo-wrap {
     width: 110px;
     height: 110px;
     flex-shrink: 0;
     border-radius: 24px;
     padding: 5px;
     background: linear-gradient(135deg, rgba(196, 92, 255, 0.95), rgba(126, 216, 255, 0.85));
     box-shadow:
       0 12px 40px rgba(196, 92, 255, 0.35),
       0 8px 30px rgba(126, 216, 255, 0.20);
}

    .logo {
      width: 100%;
      height: 100%;
      display: block;
      border-radius: 16px;
      object-fit: cover;
      background: #1a1530;
    }

    h1, h2, h3, p {
      margin: 0;
    }

    .brand h2 {
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: 0.02em;
    }

    .subtitle {
      margin-top: 6px;
      color: var(--muted);
      font-size: 1rem;
      font-weight: 500;
    }

    .box {
      position: relative;
      z-index: 1;
      margin-top: 22px;
      padding: 20px;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.035) 0%, rgba(255,255,255,0.025) 100%);
      border: 1px solid rgba(206, 179, 255, 0.10);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 22px;
      position: relative;
      z-index: 1;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 20px;
      border: 0;
      border-radius: 14px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn-primary {
      color: white;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      box-shadow: 0 10px 26px rgba(169, 96, 255, 0.28);
    }

    .btn-primary:hover {
      box-shadow: 0 14px 32px rgba(169, 96, 255, 0.38);
    }

    .btn-soft {
      color: var(--text);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .btn-soft:hover {
      background: rgba(255,255,255,0.09);
    }

    .pill {
      display: inline-block;
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      color: #ffd5ef;
      background: linear-gradient(135deg, rgba(255,117,203,0.14), rgba(196,92,255,0.12));
      border: 1px solid rgba(255,117,203,0.18);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 18px;
      position: relative;
      z-index: 1;
    }

    .stat {
      padding: 15px;
      border-radius: 16px;
      background: rgba(255,255,255,0.035);
      border: 1px solid rgba(206, 179, 255, 0.10);
    }

    .stat small {
      display: block;
      margin-bottom: 7px;
      color: var(--muted-2);
      font-size: 13px;
      font-weight: 700;
    }

    .alert {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 14px;
      font-weight: 700;
      position: relative;
      z-index: 1;
    }

    .error {
      color: #ffd8ee;
      background: rgba(255, 117, 203, 0.12);
      border: 1px solid rgba(255, 117, 203, 0.18);
    }

    .success {
      color: #d8fff1;
      background: rgba(119, 242, 194, 0.11);
      border: 1px solid rgba(119, 242, 194, 0.18);
    }

    label {
      display: block;
      margin-top: 14px;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
      position: relative;
      z-index: 1;
    }

    input, select {
      width: 100%;
      min-height: 48px;
      padding: 0 14px;
      border-radius: 14px;
      border: 1px solid rgba(206, 179, 255, 0.12);
      outline: none;
      background: rgba(11, 12, 24, 0.88);
      color: var(--text);
      font-size: 15px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      position: relative;
      z-index: 1;
    }

    input::placeholder {
      color: #8c80aa;
    }

    input:focus, select:focus {
      border-color: rgba(196, 92, 255, 0.45);
      box-shadow: 0 0 0 4px rgba(196, 92, 255, 0.12);
    }

    @media (max-width: 700px) {
      body {
        padding: 16px;
      }

      .card {
        padding: 22px;
        border-radius: 22px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .brand h2 {
        font-size: 1.65rem;
      }

      .logo-wrap {
        width: 80px;
        height: 80px;
      }
}
    
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="logo-wrap">
        <img src="/static/logo.jpg" alt="Clove Logo" class="logo">
      </div>
      <div>
        <h2>CLOVE</h2>
        <p class="subtitle">Sistema oficial de vinculação Discord + Valorant</p>
      </div>
    </div>

    {% block content %}{% endblock %}
  </div>
</body>
</html>
